name: Soroban ZK Standard CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always

jobs:
  verify-and-test:
    name: Code Quality & Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Stable Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32v1-none
          components: rustfmt, clippy

      - name: Cache Cargo Registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: 🚨 Enforce Formatting
        run: cargo fmt --all -- --check

      - name: 🔍 Strict Linting
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: 🧪 Run Tests
        run: cargo test --release

      - name: 🔨 Build WASM (verifier-sample contract)
        run: cargo build --target wasm32v1-none --release -p verifier-sample

      - name: 🛡️ Audit Dependencies (cargo-deny)
        uses: EmbarkStudios/cargo-deny-action@v2

  miri-check:
    name: 🔬 Memory Safety (Miri)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Nightly Rust + Miri
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri

      - name: 🧪 Run Miri on zk-core library
        run: cargo +nightly miri test -p zk-core --lib
        env:
          MIRIFLAGS: -Zmiri-disable-isolation

      - name: 🧪 Run native integration tests
        run: cargo +nightly test -p zk-core --test eip196_vectors

  wasm-size-check:
    name: 📦 WASM 64KB Limit Check
    runs-on: ubuntu-latest
    needs: verify-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32v1-none

      - name: Cache Cargo Registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-wasm-${{ hashFiles('**/Cargo.lock') }}

      - name: Build verifier-sample Contract WASM
        run: cargo build --release --target wasm32v1-none -p verifier-sample

      - name: Check WASM Size
        run: |
          WASM_FILE="target/wasm32v1-none/release/verifier_sample.wasm"

          if [ ! -f "$WASM_FILE" ]; then
            echo "❌ Error: verifier_sample.wasm not found!"
            exit 1
          fi

          SIZE=$(stat -c%s "$WASM_FILE")
          MAX_SIZE=65536

          echo "WASM size: $SIZE bytes / $MAX_SIZE bytes max"

          if [ $SIZE -gt $MAX_SIZE ]; then
            echo "❌ CRITICAL: WASM exceeds 64KB limit ($SIZE bytes)"
            exit 1
          else
            echo "✅ SUCCESS: $SIZE bytes — within limit"
          fi
